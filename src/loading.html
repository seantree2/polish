<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline';" />
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
    /* Only BODY is the flex centering box, and it must FILL the window. Previously html
       was ALSO display:flex, which made <body> a flex item that shrank to the pill's
       width — then overflow:hidden clipped the pill's spring (scale 1.35) at its own
       left/right edges the instant it expanded. Filling the window fixes that. */
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 17px; border-radius: 999px; /* 35% smaller than before */
      background: linear-gradient(160deg, #9179f4 0%, #7a5cee 100%);
      color: #fff; white-space: nowrap; /* no box-shadow at all — no glow */
    }
    .label { font-size: 12px; font-weight: 700; letter-spacing: .2px; }
    .spark { width: 14px; height: 14px; flex: none; transform-origin: 50% 50%; animation: spin 1.1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Exit when a refine finishes: squash (gather) -> spring to a single peak -> poof.
       No post-bounce settling oscillations; `forwards` leaves it gone at the end. */
    @keyframes q-action-pop-out {
      0%   { transform: scale(1);    opacity: 1; }
      25%  { transform: scale(0.85); opacity: 1; }   /* squash — gather */
      55%  { transform: scale(1.245); opacity: 1; }  /* spring up to peak — 30% less overshoot than the old 1.35 */
      100% { transform: scale(0);    opacity: 0; }   /* poof */
    }
    .pill.poof { animation: q-action-pop-out 600ms cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  </style>
</head>
<body>
  <div class="pill">
    <span class="label">Polishing…</span>
    <svg class="spark" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 1 C12.9 8.2, 15.8 11.1, 23 12 C15.8 12.9, 12.9 15.8, 12 23 C11.1 15.8, 8.2 12.9, 1 12 C8.2 11.1, 11.1 8.2, 12 1 Z" fill="#ffffff"/>
    </svg>
  </div>
</body>
</html>
