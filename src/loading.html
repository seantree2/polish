<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline';" />
  <style>
    html, body {
      margin: 0; height: 100%; overflow: hidden;
      background: #1a1822; color: #ececf1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    /* Center the spinner + label in the whole window (window is centered on screen). */
    body { display: flex; align-items: center; justify-content: center; }
    .card { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .spin {
      width: 48px; height: 48px; border-radius: 50%;
      border: 4px solid #3a3650; border-top-color: #8b6ff0;
      animation: r .7s linear infinite;
    }
    .label { font-size: 15px; font-weight: 500; letter-spacing: .2px; }
    @keyframes r { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="spin"></div>
    <div class="label">Polishing…</div>
  </div>
</body>
</html>
