<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline';" />
  <style>
    /* Transparent page — only the ring + label are drawn, nothing behind them. */
    html, body {
      margin: 0; height: 100%; overflow: hidden; background: transparent;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .spin {
      width: 56px; height: 56px; border-radius: 50%;
      border: 5px solid rgba(138, 111, 240, 0.30); /* faint purple track */
      border-top-color: #8b6ff0;                    /* solid purple arc */
      animation: r .7s linear infinite;
      /* no drop-shadow — keep it a clean ring with nothing behind it */
    }
    .label {
      font-size: 13px; font-weight: 600; color: #8b6ff0; letter-spacing: .2px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, .25); /* tight to the text — keeps it legible, not a box */
    }
    @keyframes r { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spin"></div>
  <div class="label">Polishing…</div>
</body>
</html>
