name: Build macOS app

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build app (universal, unpacked)
        run: npm run generate-icons && npx --no-install electron-builder --mac --universal --dir -c.mac.notarize=false --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Ad-hoc code-sign (required to launch on Apple Silicon)
        run: |
          codesign --force --deep --sign - "dist/mac-universal/Polish.app"
          codesign --verify --deep --strict --verbose=2 "dist/mac-universal/Polish.app"

      - name: Package the .dmg from the signed app
        run: npx --no-install electron-builder --mac dmg --prepackaged "dist/mac-universal/Polish.app" -c.mac.notarize=false --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload the .dmg
        uses: actions/upload-artifact@v4
        with:
          name: Polish-macOS
          path: dist/*.dmg
          if-no-files-found: error
