name: Build macOS app

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build unsigned macOS .dmg (universal — Intel + Apple Silicon)
        run: npm run generate-icons && npx --no-install electron-builder --mac --universal
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload the .dmg
        uses: actions/upload-artifact@v4
        with:
          name: Polish-macOS
          path: dist/*.dmg
          if-no-files-found: error
